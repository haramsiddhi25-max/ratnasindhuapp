<!DOCTYPE html>
<html>
<head>
<title>Konkan Tourism Admin</title>
<meta name="viewport" content="width=device-width, initial-scale=1">

<style>

/* RESET */
*{
    box-sizing:border-box;
    margin:0;
    padding:0;
}

body{
    font-family:'Segoe UI', sans-serif;
    background: linear-gradient(135deg,#e3f2fd,#fce4ec);
}

/* HEADER */
.header{
    background:#0d6efd;
    color:white;
    padding:15px;
    text-align:center;
    font-size:20px;
    position:relative;
}

.logout{
    position:absolute;
    right:10px;
    top:10px;
    background:#dc3545;
    color:white;
    border:none;
    padding:6px 12px;
    border-radius:5px;
}

/* GRID */
.grid{
    display:grid;
    grid-template-columns: repeat(auto-fit,minmax(250px,1fr));
    gap:15px;
    padding:15px;
}

/* CARD */
.card{
    background:white;
    padding:18px;
    border-radius:12px;
    box-shadow:0 6px 18px rgba(0,0,0,0.1);
    transition:0.2s;
}

.card:hover{
    transform:translateY(-3px);
}

/* COLORS */
.green{background:#4CAF50;color:white;}
.blue{background:#2196F3;color:white;}
.orange{background:#FF9800;color:white;}

/* BUTTON */
.btn{
    width:100%;
    padding:12px;
    margin-top:8px;
    border:none;
    background:#0d6efd;
    color:white;
    border-radius:8px;
    font-size:14px;
}

.btn:hover{
    background:#084298;
}

/* FEEDBACK */
.feedback{
    border-left:4px solid #0d6efd;
    padding:10px;
    margin-top:10px;
    background:#f9f9f9;
    border-radius:6px;
}

/* MOBILE FIX */
@media(max-width:500px){
    .header{
        font-size:16px;
    }
}

</style>

</head>

<body>

<!-- HEADER -->
<div class="header">
Konkan Tourism Admin Dashboard
<button class="logout" onclick="logout()">Logout</button>
</div>

<!-- STATS -->
<div class="grid">

<div class="card green">
<h3>🌍 Total Places</h3>
<h1 id="totalPlaces">0</h1>
</div>

<div class="card blue">
<h3>⭐ Avg Rating</h3>
<h1 id="avgRating">0</h1>
</div>

<div class="card orange">
<h3>💬 Feedback</h3>
<h1 id="totalFeedback">0</h1>
</div>

</div>

<!-- NAVIGATION -->
<div class="grid">

<div class="card">
<h3>📍 Tourism Places</h3>

<button class="btn" onclick="go('beach.html')">Beaches</button>
<button class="btn" onclick="go('temple.html')">Temples</button>
<button class="btn" onclick="go('fort.html')">Forts</button>
<button class="btn" onclick="go('waterfall.html')">Waterfalls</button>
</div>

<div class="card">
<h3>🎯 Activities</h3>
<button class="btn" onclick="go('activity.html')">Manage Activities</button>
</div>

<div class="card">
<h3>🏨 Hotels</h3>
<button class="btn" onclick="go('hotel.html')">Manage Hotels</button>
</div>

<div class="card">
<h3>🏪 Business</h3>
<button class="btn" onclick="go('business.html')">Manage Business</button>
</div>

<div class="card">
<h3>🤖 Chatbot</h3>
<button class="btn" onclick="go('chatbot.html')">Manage Q&A</button>
</div>

<div class="card">
<h3>💰 Budget Planner</h3>
<button class="btn" onclick="go('budget.html')">Manage Budget</button>
</div>

</div>

<!-- FEEDBACK -->
<div class="grid">

<div class="card">
<h3>Recent Feedback</h3>
<div id="feedbackList">Loading...</div>
</div>

</div>

<script>

const FIREBASE = "https://konkantourguide-default-rtdb.firebaseio.com";

/* AUTH CHECK */
if(localStorage.getItem("admin") !== "true"){
    window.location.href = "login.html";
}

/* LOGOUT */
function logout(){
    localStorage.removeItem("admin");
    window.location.href = "login.html";
}

/* NAVIGATION */
function go(page){
    window.location.href = page;
}

/* LOAD FEEDBACK */
fetch(FIREBASE + "/feedback.json")
.then(res => res.json())
.then(data => {

    let html="";
    let total=0;
    let count=0;

    for(let key in data){

        total += data[key].rating;
        count++;

        html += `
        <div class="feedback">
            ⭐ ${data[key].rating}<br>
            💬 ${data[key].comment}
        </div>`;
    }

    document.getElementById("feedbackList").innerHTML = html;
    document.getElementById("totalFeedback").innerText = count;

    let avg = count ? (total/count).toFixed(1) : 0;
    document.getElementById("avgRating").innerText = avg + " ⭐";
});

/* TOTAL PLACES */
fetch(FIREBASE + "/Places.json")
.then(res => res.json())
.then(data => {

    let count=0;

    let categories=[
        "beaches","temples","waterfalls","forts",
        "activities","hotels","businesses"
    ];

    for(let region in data){
        for(let cat of categories){
            if(data[region][cat]){
                count += Object.keys(data[region][cat]).length;
            }
        }
    }

    document.getElementById("totalPlaces").innerText = count;
});

</script>

</body>
</html>
