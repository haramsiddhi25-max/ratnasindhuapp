<!DOCTYPE html>
<html>
<head>
<title>Add Waterfall</title>

<style>
body{
    font-family:'Segoe UI', Arial;
    background: linear-gradient(135deg,#eef2f3,#dfe9f3);
    padding:20px;
    margin:0;
}

/* 🔥 WRAPPER FIX */
.wrapper{
    max-width:900px;
    margin:auto;
}

/* CARD */
.form{
    background:white;
    padding:25px;
    border-radius:15px;
    width:100%;
    box-shadow:0 8px 25px rgba(0,0,0,0.12);
}

/* TITLE */
h2{
    text-align:center;
    color:#2c3e50;
    margin-bottom:15px;
}

/* SECTION */
h3{
    margin-top:20px;
    color:#444;
    border-left:4px solid #007bff;
    padding-left:8px;
}

/* INPUT */
input, select{
    width:100%;
    padding:11px;
    margin:6px 0;
    border-radius:8px;
    border:1px solid #ccc;
    transition:0.2s;
    font-size:14px;
}

input:focus, select:focus{
    border-color:#007bff;
    outline:none;
    box-shadow:0 0 5px rgba(0,123,255,0.3);
}

/* LANGUAGE LABEL */
.lang{
    font-size:12px;
    font-weight:bold;
    color:#666;
    margin-top:5px;
}

/* BUTTON */
button{
    width:100%;
    padding:13px;
    background: linear-gradient(45deg,#007bff,#0056b3);
    color:white;
    border:none;
    margin-top:15px;
    border-radius:10px;
    font-size:15px;
    cursor:pointer;
}

button:hover{
    opacity:0.9;
}

/* ERROR */
.error{
    color:red;
    font-size:13px;
    text-align:center;
    margin-top:10px;
}

/* 📱 MOBILE FIX */
@media(max-width:600px){
    .wrapper{
        padding:0 5px;
    }
}
</style>

</head>

<body>

<div class="wrapper">

<div class="form">

<h2>🌊 Add Waterfall (धबधबा / झरना)</h2>

<select id="region">
<option value="">Select Region</option>
<option value="ratnagiri">Ratnagiri</option>
<option value="sindhudurg">Sindhudurg</option>
</select>

<h3>Name</h3>
<div class="lang">English</div>
<input id="name_en">

<div class="lang">मराठी</div>
<input id="name_mr">

<div class="lang">हिंदी</div>
<input id="name_hi">

<h3>Description</h3>
<div class="lang">English</div>
<input id="desc_en">

<div class="lang">मराठी</div>
<input id="desc_mr">

<div class="lang">हिंदी</div>
<input id="desc_hi">

<h3>Best Time</h3>
<div class="lang">English</div>
<input id="time_en">

<div class="lang">मराठी</div>
<input id="time_mr">

<div class="lang">हिंदी</div>
<input id="time_hi">

<h3>How To Reach</h3>
<div class="lang">English</div>
<input id="reach_en">

<div class="lang">मराठी</div>
<input id="reach_mr">

<div class="lang">हिंदी</div>
<input id="reach_hi">

<h3>Images (2 Required)</h3>
<input id="img1">
<input id="img2">

<h3>Map URL</h3>
<input id="map">

<button onclick="saveWaterfall()">SAVE WATERFALL</button>

<p class="error" id="err"></p>

</div>

</div>

<script>

const FIREBASE = "https://konkantourguide-default-rtdb.firebaseio.com";

function get(id){
    return document.getElementById(id).value.trim();
}

function validURL(url){
    return url.startsWith("http://") || url.startsWith("https://");
}

function saveWaterfall(){

    let err = "";

    if(!get("region")) err = "Select region";

    else if(!get("name_en") || !get("name_mr") || !get("name_hi"))
        err = "All names required";

    else if(!get("desc_en") || !get("desc_mr") || !get("desc_hi"))
        err = "All descriptions required";

    else if(!get("time_en") || !get("time_mr") || !get("time_hi"))
        err = "All best time fields required";

    else if(!get("reach_en") || !get("reach_mr") || !get("reach_hi"))
        err = "All how to reach fields required";

    else if(!validURL(get("img1")) || !validURL(get("img2")))
        err = "Valid image URLs required";

    else if(!validURL(get("map")))
        err = "Valid map URL required";

    if(err){
        document.getElementById("err").innerText = err;
        return;
    }

    let region = get("region");

    let data = {
        name:{ en:get("name_en"), mr:get("name_mr"), hi:get("name_hi") },
        description:{ en:get("desc_en"), mr:get("desc_mr"), hi:get("desc_hi") },
        bestTime:{ en:get("time_en"), mr:get("time_mr"), hi:get("time_hi") },
        howToReach:{ en:get("reach_en"), mr:get("reach_mr"), hi:get("reach_hi") },
        imageUrl1:get("img1"),
        imageUrl2:get("img2"),
        mapUrl:get("map")
    };

    fetch(`${FIREBASE}/Places/${region}/waterfalls.json`,{
        method:"POST",
        body:JSON.stringify(data)
    })
    .then(()=>{
        alert("Waterfall Added Successfully ✅");
    });

}
</script>

</body>
</html>
