<!DOCTYPE html>
<html>
<head>
<title>Admin Login</title>

<style>
body{
    margin:0;
    font-family:'Segoe UI';
    background: linear-gradient(135deg,#4facfe,#00f2fe);
    display:flex;
    justify-content:center;
    align-items:center;
    height:100vh;
}

/* BOX */
.box{
    background:white;
    padding:30px;
    border-radius:15px;
    width:320px;
    text-align:center;
    box-shadow:0 10px 25px rgba(0,0,0,0.2);
}

/* TITLE */
h1{
    margin:0;
    font-size:22px;
    color:#0d6efd;
}

h2{
    margin:10px 0 20px;
    font-size:18px;
    color:#333;
}

/* INPUT */
.input-box{
    position:relative;
}

input{
    width:100%;
    padding:12px;
    margin:10px 0;
    border-radius:8px;
    border:1px solid #ccc;
    outline:none;
}

/* EYE ICON */
.eye{
    position:absolute;
    right:10px;
    top:50%;
    transform:translateY(-50%);
    cursor:pointer;
    font-size:14px;
}

/* BUTTON */
button{
    width:100%;
    padding:12px;
    background: linear-gradient(45deg,#28a745,#218838);
    color:white;
    border:none;
    border-radius:8px;
    font-size:15px;
    margin-top:10px;
    cursor:pointer;
}

button:hover{
    opacity:0.9;
}

/* FOOTER */
.footer{
    margin-top:10px;
    font-size:12px;
    color:#777;
}
</style>

</head>

<body>

<div class="box">

<h1>🌴 Ratnasindhu</h1>
<h2>Admin Login</h2>

<input id="email" placeholder="Enter Email">

<div class="input-box">
    <input id="password" type="password" placeholder="Enter Password">
    <span class="eye" onclick="togglePassword()">👁</span>
</div>

<button onclick="login()">LOGIN</button>

<div class="footer">Secure Admin Access</div>

</div>

<script>

// 👁 SHOW/HIDE PASSWORD
function togglePassword(){
    let pass = document.getElementById("password");

    if(pass.type === "password"){
        pass.type = "text";
    } else {
        pass.type = "password";
    }
}

</script>

<script src="login.js"></script>

</body>
</html>
